# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Enable version updates for npm/pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Detroit"
    open-pull-requests-limit: 10
    # Keep grouped update PRs review-only until this repository has a required
    # Studio CI check. Do not pair this with ungated write-capable auto-merge.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Also check GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
